<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" height="300" font-family="'Apple SD Gothic Neo','Malgun Gothic',sans-serif">
  <!-- 하늘 -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe0fb"/>
      <stop offset="1" stop-color="#e3f1ff"/>
    </linearGradient>
  </defs>
  <rect width="720" height="300" fill="url(#sky)"/>

  <!-- 해 -->
  <circle cx="652" cy="58" r="30" fill="#ffe39b"/>
  <circle cx="652" cy="58" r="42" fill="#ffe39b" opacity="0.35"/>

  <!-- 구름 (흐름) -->
  <g fill="#ffffff" opacity="0.95">
    <g>
      <ellipse cx="0" cy="70" rx="26" ry="16"/><ellipse cx="22" cy="62" rx="20" ry="15"/><ellipse cx="-20" cy="64" rx="18" ry="13"/>
      <animateTransform attributeName="transform" type="translate" from="-80 0" to="800 0" dur="24s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="0" cy="130" rx="22" ry="13"/><ellipse cx="18" cy="124" rx="16" ry="12"/>
      <animateTransform attributeName="transform" type="translate" from="-380 0" to="800 0" dur="19s" repeatCount="indefinite"/>
    </g>
    <g>
      <ellipse cx="0" cy="40" rx="20" ry="12"/><ellipse cx="16" cy="34" rx="14" ry="11"/>
      <animateTransform attributeName="transform" type="translate" from="-620 0" to="800 0" dur="30s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- 새 -->
  <g stroke="#5a6480" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M0,-4 L8,2 L16,-4">
      <animateTransform attributeName="transform" type="translate" from="740 90" to="-40 70" dur="13s" repeatCount="indefinite"/>
    </path>
    <path d="M0,-4 L8,2 L16,-4">
      <animateTransform attributeName="transform" type="translate" from="-40 150" to="740 120" dur="16s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- 발판들 -->
  <g>
    <rect x="95"  y="245" width="92" height="16" rx="7" fill="#5fb95f"/>
    <rect x="470" y="235" width="92" height="16" rx="7" fill="#fa9a37"/> <!-- 트램펄린색 -->
    <rect x="300" y="180" width="92" height="16" rx="7" fill="#5fb95f"/>
    <rect x="540" y="120" width="78" height="16" rx="7" fill="#9682e6"/> <!-- 움직이는색 -->
  </g>

  <!-- 코인 (반짝 회전) -->
  <g transform="translate(346,150)">
    <ellipse cx="0" cy="0" rx="9" ry="9" fill="#ffce3c" stroke="#d2961e" stroke-width="2">
      <animate attributeName="rx" values="9;2;9" dur="1.4s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- 졸라맨 (통통 점프) -->
  <g transform="translate(346,214)">
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0; 0 -64; 0 4" keyTimes="0;0.5;1" dur="1.15s" calcMode="spline" keySplines="0.18 0 0.3 1; 0.7 0 0.85 1" repeatCount="indefinite"/>
      <g stroke="#23232f" stroke-width="3.4" fill="none" stroke-linecap="round" transform="scale(1.5)">
        <!-- 머리카락 -->
        <g stroke-width="1.4">
          <path d="M-5,-19 -8,-30"/><path d="M-3,-20 -4,-32"/><path d="M0,-21 0,-33"/><path d="M3,-20 4,-32"/><path d="M5,-19 8,-30"/>
        </g>
        <!-- 머리 -->
        <circle cx="0" cy="-13" r="7"/>
        <!-- 몸 -->
        <path d="M0,-6 L0,8"/>
        <!-- 팔 -->
        <path d="M0,-3 L-9,-9"/><path d="M0,-3 L9,-9"/>
        <!-- 다리 -->
        <path d="M0,8 L-7,18"/><path d="M0,8 L7,18"/>
      </g>
    </g>
  </g>

  <!-- 공주 (오른쪽 위, 반짝) -->
  <g transform="translate(560,96)">
    <rect x="-26" y="22" width="52" height="10" rx="5" fill="#aa875f"/>
    <g transform="scale(0.85)">
      <ellipse cx="0" cy="18" rx="20" ry="22" fill="#f68abe"/>
      <circle cx="0" cy="-8" r="12" fill="#ffe2c8"/>
      <path d="M-12,-9 Q0,-22 12,-9" fill="#36293f"/>
      <circle cx="-4" cy="-9" r="2" fill="#3c2d3c"/><circle cx="4" cy="-9" r="2" fill="#3c2d3c"/>
      <path d="M-9,-14 L-9,-21 L-4,-16 L0,-23 L4,-16 L9,-21 L9,-14 Z" fill="#ffce54"/>
    </g>
    <g fill="#ffd45a">
      <path d="M-30,-8 l2,5 l5,2 l-5,2 l-2,5 l-2,-5 l-5,-2 l5,-2 z">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.6s" repeatCount="indefinite"/>
      </path>
      <path d="M28,6 l1.5,4 l4,1.5 l-4,1.5 l-1.5,4 l-1.5,-4 l-4,-1.5 l4,-1.5 z">
        <animate attributeName="opacity" values="1;0.2;1" dur="1.9s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>

  <!-- 제목 -->
  <text x="44" y="80" font-size="42" font-weight="800" fill="#2b2b46">졸라맨 점프</text>
  <text x="46" y="112" font-size="18" font-weight="600" fill="#5a6a8a">하늘 위 공주를 구하러, 아슬아슬 더 높이!</text>
</svg>
