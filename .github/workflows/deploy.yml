name: Deploy to GitHub Pages

# main에 push되면 정적 사이트 전체를 GitHub Pages로 배포한다.
# (configure-pages의 enablement:true 가 Pages를 자동으로 켜준다 — Settings 수동 토글 불필요)
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages (자동 활성화)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site (repo 루트 전체)
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
